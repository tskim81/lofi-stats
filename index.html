<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로파이 제국 공용 상황판</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f111a;
            --surface: #1c1f2e;
            --card: #25293c;
            --primary: #cdbdff;
            --primary-glow: #7c4dff;
            --secondary: #ffb1c1;
            --secondary-glow: #ff4081;
            --tertiary: #00daf3;
            --text-main: #e6e0ee;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--card); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-glow); }

        .glass-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 5% 5%, rgba(124, 77, 255, 0.1) 0%, transparent 30%),
                        radial-gradient(circle at 95% 95%, rgba(255, 64, 129, 0.1) 0%, transparent 30%);
            z-index: -1;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
            padding: 40px;
            max-width: 1850px;
            margin: 0 auto;
        }

        header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 20px;
        }

        .hq-title {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-stats {
            display: flex;
            gap: 40px;
        }

        .stat-item { text-align: right; }
        .stat-label { font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }
        .stat-value { font-size: 22px; font-weight: 700; color: var(--primary); }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 24px;
        }

        .glass-card {
            background: rgba(28, 31, 46, 0.6);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .channel-header {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .profile-img {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--card);
            object-fit: cover;
            border: 2px solid var(--primary);
        }

        .channel-name { font-size: 20px; font-weight: 700; color: #fff; }
        .subs-count { font-size: 13px; color: var(--text-dim); }

        .metrics-detailed {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .metric-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 16px;
            font-size: 13px;
        }

        .metric-val { font-weight: 700; color: var(--primary); float: right; }
        .metric-highlight { color: var(--secondary); font-weight: 800; }

        .video-list-container {
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 10px;
        }

        .video-item {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .video-title { color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        .video-v { font-weight: 700; color: var(--tertiary); }

        .sidebar { display: flex; flex-direction: column; gap: 30px; }

        .live-pulse {
            width: 10px; height: 10px; background: #00ff00; border-radius: 50%; display: inline-block; margin-right: 8px;
            box-shadow: 0 0 10px #00ff00;
        }

        .public-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary-glow);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="glass-bg"></div>
    <div class="public-badge">🌍 Public Pavilion v4.0</div>

    <div class="container">
        <header>
            <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
                <div class="hq-title">MASTER HQ 公用 상황판 
                    <small style="font-size: 14px; opacity: 0.6; vertical-align: middle; margin-left: 10px;">Global Read-only Monitor</small>
                </div>
                <div class="header-stats">
                    <div class="stat-item">
                        <div class="stat-label">상태</div>
                        <div class="stat-value"><span class="live-pulse"></span>ONLINE</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">마지막 동기화</div>
                        <div class="stat-value" id="last-update-time" style="font-size: 16px; color: var(--secondary);">Loding...</div>
                    </div>
                </div>
            </div>
        </header>

        <main class="channel-grid" id="main-grid">
            <!-- Dynamic Content -->
        </main>

        <aside class="sidebar">
            <div class="glass-card" id="ian-card">
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
                    <span style="font-size: 24px;">🤓</span>
                    <span style="font-weight: 700;">알고리즘 그로스 해킹</span>
                </div>
                <div id="ian-content">분석 로딩 중...</div>
            </div>

            <div class="glass-card" id="sophia-card">
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
                    <span style="font-size: 24px;">🌍</span>
                    <span style="font-weight: 700;">커뮤니티 하트비트</span>
                </div>
                <div style="background: rgba(255,100,200,0.05); padding: 15px; border-radius: 12px; border: 1px dashed rgba(255,100,200,0.2);">
                    <p style="font-size: 14px; font-weight: 500; color: #ff64c8; margin-bottom: 5px;">💓 Global Vibe Check</p>
                    <p style="font-size: 12px; line-height: 1.6; color: var(--text-main);">"Welcome to Lo-fi Empire. Our fleets are expanding globally."</p>
                </div>
            </div>
        </aside>
    </div>

    <script>
        async function loadDashboard() {
            try {
                const response = await fetch('master_hq_stats.json');
                const stats = await response.json();
                
                // Show last update time
                if (stats.last_updated) {
                    document.getElementById('last-update-time').innerText = stats.last_updated;
                }

                const grid = document.getElementById('main-grid');
                grid.innerHTML = '';

                Object.keys(stats).filter(k => k.startsWith('channel_')).forEach(cid => {
                    const cdata = stats[cid];
                    const card = document.createElement('div');
                    card.className = 'glass-card';
                    
                    let videoItems = '';
                    cdata.videos.filter(v => v.privacy === 'public').slice(0, 10).forEach(v => {
                        videoItems += `
                            <div class="video-item">
                                <span class="video-title">${v.is_short ? '[S]' : '[L]'} ${v.title}</span>
                                <span class="video-v">${v.views.toLocaleString()}회</span>
                            </div>
                        `;
                    });

                    card.innerHTML = `
                        <div class="channel-header">
                            <img src="${cdata.thumbnail}" class="profile-img">
                            <div class="channel-info">
                                <div class="channel-name">${cdata.title}</div>
                                <div class="subs-count">조회수 ${cdata.total_views.toLocaleString()}</div>
                            </div>
                        </div>
                        <div class="metrics-detailed">
                            <div class="metric-item">롱폼 <span class="metric-val">${cdata.metrics.long_total}개</span></div>
                            <div class="metric-item">숏폼 <span class="metric-val">${cdata.metrics.short_total}개</span></div>
                            <div class="metric-item">공개 롱폼 <span class="metric-val metric-highlight">${cdata.metrics.public_long}개</span></div>
                            <div class="metric-item">공개 숏폼 <span class="metric-val metric-highlight">${cdata.metrics.public_short}개</span></div>
                        </div>
                        <div class="video-section">
                            <div style="font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--tertiary);">📊 성과 (최근)</div>
                            <div class="video-list-container">${videoItems}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                // Load ian report
                const ianResp = await fetch('ian_daily_report.json');
                const ianData = await ianResp.json();
                const ianContent = document.getElementById('ian-content');
                
                let strategies = '';
                ianData.strategies.forEach(s => {
                    strategies += `
                        <div style="padding: 10px; background: rgba(0,0,0,0.2); border-left: 3px solid var(--primary); margin-top: 10px; border-radius: 4px;">
                            <div style="font-size: 13px; font-weight: 700;">🎯 ${s.title}</div>
                            <div style="font-size: 11px; opacity: 0.7;">${s.description}</div>
                        </div>
                    `;
                });

                ianContent.innerHTML = `
                    <div style="background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 20px;">
                        <p style="font-size: 13px; line-height: 1.6;">"${ianData.summary}"</p>
                    </div>
                    ${strategies}
                `;

            } catch (err) {
                console.error(err);
                document.getElementById('main-grid').innerHTML = '<p>데이터를 불러오지 못했습니다. GitHub Pages 배포 완료 대기 중일 수 있습니다.</p>';
            }
        }

        loadDashboard();
        setInterval(loadDashboard, 300000); // 5분마다 갱신
    </script>
</body>
</html>
